
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Wingman — Your exclusive Miami nightlife concierge. Book curated experiences at elite venues." />
    <meta property="og:title" content="Wingman" />
    <meta property="og:description" content="Exclusive nightlife experiences curated by Wingman." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Wingman — Exclusive Experiences</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap');

      /* ── WINGMAN BRAND TOKENS ──────────────────────────────── */
      :root {
        /* Gradient: fuchsia → violet → cyan (from logo) */
        --brand-start:  #E040FB;   /* fuchsia  */
        --brand-mid:    #7B61FF;   /* violet   */
        --brand-end:    #00D4FF;   /* cyan     */
        --brand-gradient: linear-gradient(135deg, #E040FB 0%, #7B61FF 50%, #00D4FF 100%);
        --brand-gradient-text: linear-gradient(90deg, #E040FB, #7B61FF, #00D4FF);

        /* Surfaces */
        --color-background: #000000;
        --color-surface-1:  #0D0D0D;
        --color-surface-2:  #141414;
        --color-surface-3:  #1C1C1E;
        --color-border:     rgba(255,255,255,0.08);
        --color-border-strong: rgba(255,255,255,0.15);

        /* Text */
        --color-text:       #FFFFFF;
        --color-text-muted: #6B6B6B;
        --color-text-sub:   #A0A0A0;

        /* Legacy compat (keep #EC4899 references working) */
        --color-primary:    #E040FB;
        --color-primary-foreground: #FFFFFF;
        --color-accent:     #00D4FF;
        --color-ring:       #7B61FF;
        --color-card:       #141414;
        --color-card-foreground: #FFFFFF;
        --color-secondary:  #1C1C1E;
        --color-secondary-foreground: #FFFFFF;
        --color-danger:     #FF3B30;
        --color-danger-foreground: #FFFFFF;
        --color-overlay:    rgba(0,0,0,0.85);
      }


      /* Light mode — not used currently but kept for future */
      .light {
        --color-background: #F3F4F6;
        --color-card: #FFFFFF;
        --color-primary: #E040FB;
        --color-text: #111827;
        --color-border: rgba(0,0,0,0.1);
      }


      body {
        font-family: 'Space Grotesk', 'Inter', -apple-system, sans-serif;
        background-color: var(--color-background);
        color: var(--color-text, #fff);
        transition: background-color 0.3s ease, color 0.3s ease;
        overscroll-behavior-y: none;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ── BRAND GRADIENT UTILITIES ──────────────────────────── */
      .brand-gradient {
        background: var(--brand-gradient);
      }
      .brand-gradient-text {
        background: var(--brand-gradient-text);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .brand-border {
        border: 1px solid transparent;
        background-clip: padding-box;
        position: relative;
      }
      .brand-glow {
        box-shadow: 0 0 20px rgba(224, 64, 251, 0.25), 0 0 60px rgba(0, 212, 255, 0.1);
      }
      .brand-glow-sm {
        box-shadow: 0 4px 16px rgba(224, 64, 251, 0.2);
      }

      /* Custom scrollbar for a more premium feel */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--color-secondary);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--color-primary);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--color-primary-hover);
      }
      
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }

      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
      
      /* ── ANIMATIONS ───────────────────────────────────────── */
      @keyframes checkmark-pop-in {
        0%   { transform: scale(0.6); opacity: 0; }
        60%  { transform: scale(1.2); opacity: 1; }
        100% { transform: scale(1); }
      }
      .animate-checkmark-pop { animation: checkmark-pop-in 0.4s ease-out forwards; }

      @keyframes flash-blue {
        0%, 100% { box-shadow: none; }
        50% { box-shadow: 0 0 12px 4px rgba(0, 212, 255, 0.5); }
      }
      .animate-flash-blue { animation: flash-blue 1.5s ease-out; }

      @keyframes claim-success {
        0%   { transform: scale(1); }
        50%  { transform: scale(1.1) rotate(-2deg); box-shadow: 0 0 20px rgba(224,64,251,0.5); }
        100% { transform: scale(1); }
      }
      .animate-claim-success { animation: claim-success 0.6s ease-out forwards; }

      @keyframes page-enter {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-page-enter { animation: page-enter 0.35s ease-out forwards; }

      @keyframes slide-in-right {
        from { transform: translateX(100%); }
        to   { transform: translateX(0); }
      }
      .animate-slide-in-right { animation: slide-in-right 0.3s ease-out forwards; }

      @keyframes animate-fade-in {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in { animation: animate-fade-in 0.4s ease-out forwards; }

      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 8px rgba(224,64,251,0.3); }
        50%       { box-shadow: 0 0 24px rgba(0,212,255,0.5); }
      }
      .animate-pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }

      /* Fade-in-up used by various modals */
      @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up { animation: fade-in-up 0.4s ease-out forwards; }

    </style>
