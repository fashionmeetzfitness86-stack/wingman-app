
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Wingman — Your exclusive Miami nightlife concierge. Book curated experiences at elite venues." />
    <meta property="og:title" content="Wingman" />
    <meta property="og:description" content="Exclusive nightlife experiences curated by Wingman." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Wingman — Exclusive Experiences</title>
    <link rel="icon" href="/assets/login-logo-white.png" type="image/png" />
    <meta property="og:image" content="/assets/login-logo-white.png" />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap');

      /* ── WINGMAN BRAND TOKENS ──────────────────────────────── */
      :root {
        /* ── Dark mode (default) — Electric Night ─────────────── */
        /* Gradient: violet → magenta → cyan */
        --brand-start:  #E040FB;
        --brand-mid:    #7B61FF;
        --brand-end:    #00D4FF;
        --brand-gradient: linear-gradient(135deg, #E040FB 0%, #7B61FF 50%, #00D4FF 100%);
        --brand-gradient-text: linear-gradient(90deg, #E040FB, #7B61FF, #00D4FF);

        /* Accent colors */
        --accent-purple: #E040FB;
        --accent-violet: #7B61FF;
        --accent-cyan:   #00D4FF;
        --accent-glow-purple: rgba(224,64,251,0.25);
        --accent-glow-cyan:   rgba(0,212,255,0.18);

        /* Surfaces */
        --color-background: #08080A;
        --color-surface-1:  #0F0F14;
        --color-surface-2:  #141419;
        --color-surface-3:  #1A1A22;
        --color-border:     rgba(255,255,255,0.07);
        --color-border-strong: rgba(255,255,255,0.14);
        --color-border-accent: rgba(224,64,251,0.25);

        /* Text */
        --color-text:       #FFFFFF;
        --color-text-muted: #8A8E99;
        --color-text-sub:   #4A4E5A;

        /* Legacy compat */
        --color-primary:    #E040FB;
        --color-primary-foreground: #FFFFFF;
        --color-accent:     #7B61FF;
        --color-ring:       #E040FB;
        --color-card:       #0F0F14;
        --color-card-foreground: #FFFFFF;
        --color-secondary:  #141419;
        --color-secondary-foreground: #FFFFFF;
        --color-danger:     rgba(239,68,68,0.15);
        --color-danger-foreground: #EF4444;
        --color-success:    rgba(34,197,94,0.15);
        --color-success-foreground: #22C55E;
        --color-overlay:    rgba(0,0,0,0.92);

        /* Settings row */
        --settings-row-bg:    rgba(255,255,255,0.04);
        --settings-row-border: rgba(255,255,255,0.08);
        --settings-row-hover: rgba(255,255,255,0.07);
        --settings-icon-color: #E040FB;
      }

      /* ── LIGHT MODE — Golden Hour ──────────────────────────── */
      /* Warm ivory / champagne with deep plum accents */
      .light {
        --brand-start:  #7B1FA2;
        --brand-mid:    #9C27B0;
        --brand-end:    #CE93D8;
        --brand-gradient: linear-gradient(135deg, #4A148C 0%, #7B1FA2 50%, #CE93D8 100%);
        --brand-gradient-text: linear-gradient(90deg, #4A148C, #7B1FA2, #9C27B0);

        --accent-purple: #7B1FA2;
        --accent-violet: #9C27B0;
        --accent-cyan:   #0288D1;
        --accent-glow-purple: rgba(123,31,162,0.12);
        --accent-glow-cyan:   rgba(2,136,209,0.1);

        --color-background: #FAF8F5;
        --color-surface-1:  #FFFFFF;
        --color-surface-2:  #F4F0EA;
        --color-surface-3:  #EDE8DF;
        --color-border:     rgba(0,0,0,0.07);
        --color-border-strong: rgba(0,0,0,0.14);
        --color-border-accent: rgba(123,31,162,0.2);

        --color-text:       #1A1020;
        --color-text-muted: #5C4E6A;
        --color-text-sub:   #8B7DA0;

        --color-primary:    #7B1FA2;
        --color-primary-foreground: #FFFFFF;
        --color-accent:     #9C27B0;
        --color-ring:       #7B1FA2;
        --color-card:       #FFFFFF;
        --color-card-foreground: #1A1020;
        --color-secondary:  #F4F0EA;
        --color-secondary-foreground: #1A1020;
        --color-danger:     rgba(185,28,28,0.1);
        --color-danger-foreground: #B91C1C;
        --color-success:    rgba(21,128,61,0.1);
        --color-success-foreground: #15803D;
        --color-overlay:    rgba(0,0,0,0.5);

        /* Settings row */
        --settings-row-bg:    rgba(0,0,0,0.03);
        --settings-row-border: rgba(0,0,0,0.07);
        --settings-row-hover: rgba(123,31,162,0.05);
        --settings-icon-color: #7B1FA2;
      }

      /* ── LIGHT-MODE OVERRIDES for hardcoded Tailwind dark utilities ── */
      .light .bg-black { background-color: #FAF8F5 !important; }
      .light .bg-gray-950 { background-color: #F4F0EA !important; }
      .light .bg-gray-900 { background-color: #FFFFFF !important; }
      .light .bg-gray-900\/30 { background-color: rgba(255,255,255,0.8) !important; }
      .light .bg-gray-900\/50 { background-color: rgba(255,255,255,0.9) !important; }
      .light .bg-gray-800 { background-color: #F4F0EA !important; }
      .light .bg-gray-800\/30 { background-color: rgba(244,240,234,0.6) !important; }
      .light .bg-gray-800\/50 { background-color: rgba(244,240,234,0.85) !important; }
      .light .bg-gray-700 { background-color: #EDE8DF !important; }
      .light .hover\:bg-gray-800:hover { background-color: #EDE8DF !important; }
      .light .hover\:bg-gray-900:hover { background-color: #F4F0EA !important; }

      .light .text-white { color: #1A1020 !important; }
      .light .text-gray-100 { color: #2D1B40 !important; }
      .light .text-gray-200 { color: #3D2A52 !important; }
      .light .text-gray-300 { color: #5C4E6A !important; }
      .light .text-gray-400 { color: #6B5E7E !important; }
      .light .text-gray-500 { color: #8B7DA0 !important; }
      .light .text-gray-600 { color: #A897B8 !important; }
      .light .hover\:text-white:hover { color: #1A1020 !important; }

      .light .border-gray-700,
      .light .border-gray-800,
      .light .border-gray-900 { border-color: rgba(123,31,162,0.12) !important; }

      .light .divide-gray-800 > :not([hidden]) ~ :not([hidden]) { border-color: rgba(123,31,162,0.08) !important; }

      /* Body baseline */
      .light body { color: #1A1020; background-color: #FAF8F5; }

      /* Light mode accent override for amber (legacy) */
      .light .text-amber-400 { color: #7B1FA2 !important; }


      body {
        font-family: 'Space Grotesk', 'Inter', -apple-system, sans-serif;
        background-color: var(--color-background);
        color: var(--color-text, #fff);
        transition: background-color 0.3s ease, color 0.3s ease;
        overscroll-behavior-y: none;
        overflow-x: hidden;
        width: 100%;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ── BRAND GRADIENT UTILITIES ──────────────────────────── */
      .brand-gradient {
        background: var(--brand-gradient);
      }
      .brand-gradient-text {
        background: var(--brand-gradient-text);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .brand-border {
        border: 1px solid transparent;
        background-clip: padding-box;
        position: relative;
      }
      .brand-glow {
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.15), 0 0 60px rgba(156, 163, 175, 0.1);
      }
      .brand-glow-sm {
        box-shadow: 0 4px 16px rgba(255, 255, 255, 0.1);
      }

      /* Custom scrollbar for a more premium feel */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--color-secondary);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--color-primary);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--color-primary-hover);
      }
      
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }

      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
      
      /* ── ANIMATIONS ───────────────────────────────────────── */
      @keyframes checkmark-pop-in {
        0%   { transform: scale(0.8); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }
      .animate-checkmark-pop { animation: checkmark-pop-in 0.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

      @keyframes flash-blue {
        0%, 100% { box-shadow: none; }
        50% { box-shadow: 0 0 12px 2px rgba(74, 107, 126, 0.3); }
      }
      .animate-flash-blue { animation: flash-blue 1s ease-out; }

      @keyframes claim-success {
        0%   { transform: scale(1); }
        50%  { transform: scale(1.02); box-shadow: 0 0 16px rgba(255,255,255,0.15); }
        100% { transform: scale(1); }
      }
      .animate-claim-success { animation: claim-success 0.25s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

      @keyframes page-enter {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-page-enter { animation: page-enter 0.25s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

      @keyframes slide-in-right {
        from { transform: translateX(100%); }
        to   { transform: translateX(0); }
      }
      .animate-slide-in-right { animation: slide-in-right 0.25s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

      @keyframes animate-fade-in {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in { animation: animate-fade-in 0.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 4px rgba(255,255,255,0.05); }
        50%       { box-shadow: 0 0 16px rgba(115, 133, 150, 0.15); }
      }
      .animate-pulse-glow { animation: pulse-glow 2.5s ease-in-out infinite; }

      /* Fade-in-up used by various modals */
      @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up { animation: fade-in-up 0.25s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

      /* ── MODAL SCROLL LOCK ─────────────────────────────────── */
      /* Companion to useScrollLock hook — covers all browser edge cases */
      body.modal-open {
        overflow: hidden !important;
        /* iOS Safari: position:fixed is set by the hook, this just reinforces */
        touch-action: none;
        -webkit-overflow-scrolling: auto;
      }
      /* Backdrops swallow touches so underlying page never scrolls */
      [data-modal-backdrop] {
        touch-action: none;
        overscroll-behavior: none;
      }

    </style>

</head>
<body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
