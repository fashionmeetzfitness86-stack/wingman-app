
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Wingman — Your exclusive Miami nightlife concierge. Book curated experiences at elite venues." />
    <meta property="og:title" content="Wingman" />
    <meta property="og:description" content="Exclusive nightlife experiences curated by Wingman." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Wingman — Exclusive Experiences</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap');

      /* ── WINGMAN BRAND TOKENS ──────────────────────────────── */
      :root {
        /* Gradient: steel → white → muted cyan */
        --brand-start:  #FFFFFF;
        --brand-mid:    #738596;
        --brand-end:    #4A6B7E;
        --brand-gradient: linear-gradient(135deg, #FFFFFF 0%, #738596 50%, #1A252C 100%);
        --brand-gradient-text: linear-gradient(90deg, #FFFFFF, #738596, #1A252C);

        /* Surfaces */
        --color-background: #08080A;
        --color-surface-1:  #0F1014;
        --color-surface-2:  #15161A;
        --color-surface-3:  #1C1D22;
        --color-border:     rgba(255,255,255,0.06);
        --color-border-strong: rgba(255,255,255,0.12);

        /* Text */
        --color-text:       #FFFFFF;
        --color-text-muted: #8A8E99;
        --color-text-sub:   #5D616B;

        /* Legacy compat */
        --color-primary:    #FFFFFF;
        --color-primary-foreground: #000000;
        --color-accent:     #4A6B7E;
        --color-ring:       #738596;
        --color-card:       #0F1014;
        --color-card-foreground: #FFFFFF;
        --color-secondary:  #15161A;
        --color-secondary-foreground: #FFFFFF;
        --color-danger:     #6E1B1B; /* dark red, not bright */
        --color-danger-foreground: #FFFFFF;
        --color-success:    #1B4A3A; /* muted dark green */
        --color-overlay:    rgba(0,0,0,0.9);
      }


      /* Light mode — not used currently but kept for future */
      .light {
        --color-background: #F3F4F6;
        --color-card: #FFFFFF;
        --color-primary: #FFFFFF;
        --color-text: #111827;
        --color-border: rgba(0,0,0,0.1);
      }


      body {
        font-family: 'Space Grotesk', 'Inter', -apple-system, sans-serif;
        background-color: var(--color-background);
        color: var(--color-text, #fff);
        transition: background-color 0.3s ease, color 0.3s ease;
        overscroll-behavior-y: none;
        overflow-x: hidden;
        width: 100%;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ── BRAND GRADIENT UTILITIES ──────────────────────────── */
      .brand-gradient {
        background: var(--brand-gradient);
      }
      .brand-gradient-text {
        background: var(--brand-gradient-text);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .brand-border {
        border: 1px solid transparent;
        background-clip: padding-box;
        position: relative;
      }
      .brand-glow {
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.15), 0 0 60px rgba(156, 163, 175, 0.1);
      }
      .brand-glow-sm {
        box-shadow: 0 4px 16px rgba(255, 255, 255, 0.1);
      }

      /* Custom scrollbar for a more premium feel */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--color-secondary);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--color-primary);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--color-primary-hover);
      }
      
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }

      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
      
      /* ── ANIMATIONS ───────────────────────────────────────── */
      @keyframes checkmark-pop-in {
        0%   { transform: scale(0.8); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }
      .animate-checkmark-pop { animation: checkmark-pop-in 0.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

      @keyframes flash-blue {
        0%, 100% { box-shadow: none; }
        50% { box-shadow: 0 0 12px 2px rgba(74, 107, 126, 0.3); }
      }
      .animate-flash-blue { animation: flash-blue 1s ease-out; }

      @keyframes claim-success {
        0%   { transform: scale(1); }
        50%  { transform: scale(1.02); box-shadow: 0 0 16px rgba(255,255,255,0.15); }
        100% { transform: scale(1); }
      }
      .animate-claim-success { animation: claim-success 0.25s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

      @keyframes page-enter {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-page-enter { animation: page-enter 0.25s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

      @keyframes slide-in-right {
        from { transform: translateX(100%); }
        to   { transform: translateX(0); }
      }
      .animate-slide-in-right { animation: slide-in-right 0.25s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

      @keyframes animate-fade-in {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in { animation: animate-fade-in 0.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 4px rgba(255,255,255,0.05); }
        50%       { box-shadow: 0 0 16px rgba(115, 133, 150, 0.15); }
      }
      .animate-pulse-glow { animation: pulse-glow 2.5s ease-in-out infinite; }

      /* Fade-in-up used by various modals */
      @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up { animation: fade-in-up 0.25s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

    </style>
